            border: none;

            height: 32px;
            border-radius: 0;

            background-color: transparent;
            border-radius: 0;
        }
        .track-player audio::-webkit-media-controls-current-time-display,

            border-radius: 0;
            background-color: transparent;

        .track-player:hover audio::-webkit-media-controls-timeline::-webkit-media-slider-thumb {

        .track-player::after {
            display: none;
        }

            align-items: center;

            'https://drive.google.com/thumbnail?id=1-MFcJlwOB7d-QQo56YJXCYw3CeU-H2zj&sz=w1920',
            'https://drive.google.com/thumbnail?id=1BSVMSTuSerNum-I_CcTJ3JGxlvm3pK9O&sz=w1920'
        ];

        let currentIndex = 0;
        let backgroundInterval = null;
        let bgIndex = 0;
        const mainContent = document.getElementById('mainContent');

        // Переменные для полноэкранного просмотра галереи
        let currentGalleryPageId = null;
        let currentGalleryIndex = 0;
        let galleryModal = document.getElementById('galleryModal');
        let modalImage = document.getElementById('modalGalleryImage');

        // переменная для хранения текущей открытой галереи (основной, не модальной)
        let currentMainGalleryId = null;

        // Таймер для авто-скрытия стрелок модалки
        let modalArrowsTimer = null;

        // Для страницы Gallery: хранит суффикс активной галереи (1 или 2)
        let currentGallerySuffix = 1;

        // Функция для предзагрузки изображения
        function preloadImage(src) {
            const img = new Image();
            img.src = src;
        }

        function changeBackground() {
            bgIndex = (bgIndex + 1) % backgroundImages.length;
            mainContent.style.backgroundImage = `url('${backgroundImages[bgIndex]}')`;
            // Предзагружаем следующее изображение
            const nextIndex = (bgIndex + 1) % backgroundImages.length;
            preloadImage(backgroundImages[nextIndex]);
        }

        function startBackgroundRotation() {
            if (backgroundInterval) clearInterval(backgroundInterval);
            bgIndex = 0;
            mainContent.style.backgroundImage = `url('${backgroundImages[0]}')`;
            // Предзагружаем второе изображение (если есть)
            if (backgroundImages.length > 1) {
                preloadImage(backgroundImages[1]);
            }
            backgroundInterval = setInterval(changeBackground, 8000);
        }

        function stopBackgroundRotation() {
            if (backgroundInterval) {
                clearInterval(backgroundInterval);
                backgroundInterval = null;
            }
            mainContent.style.backgroundImage = 'none';
        }

        // Функции для полноэкранного просмотра галереи (и обложек)
        window.openGalleryModal = function(pageId, index) {
            currentGalleryPageId = pageId;
            currentGalleryIndex = index;
            updateModalImage();
            galleryModal.style.display = 'flex';
            // Убираем класс hide-nav, так как это обычная галерея
            galleryModal.classList.remove('hide-nav');

            // Показываем стрелки и запускаем таймер скрытия
            showModalArrows();
            startModalArrowsTimer();

            document.addEventListener('keydown', handleGalleryKey);
        };

        window.closeGalleryModal = function() {
            galleryModal.style.display = 'none';
            galleryModal.classList.remove('hide-nav');
            document.removeEventListener('keydown', handleGalleryKey);
            // Очищаем таймер при закрытии
            if (modalArrowsTimer) {
                clearTimeout(modalArrowsTimer);
                modalArrowsTimer = null;
            }
        };

        // Функции для управления видимостью стрелок модалки
        function showModalArrows() {
            const navs = document.querySelectorAll('.gallery-modal .modal-nav');
            navs.forEach(nav => nav.style.opacity = '0.75');
        }

        function hideModalArrows() {
            const navs = document.querySelectorAll('.gallery-modal .modal-nav');
            navs.forEach(nav => nav.style.opacity = '0');
        }

        function startModalArrowsTimer() {
            if (modalArrowsTimer) clearTimeout(modalArrowsTimer);
            modalArrowsTimer = setTimeout(hideModalArrows, 3000);
        }

        // Обработчик движения мыши в модалке
        galleryModal.addEventListener('mousemove', function() {
            if (galleryModal.style.display === 'flex' && !galleryModal.classList.contains('hide-nav')) {
                showModalArrows();
                startModalArrowsTimer();
            }
        });

        window.prevModalImage = function() {
            if (!currentGalleryPageId) return;
            const images = galleryImages[currentGalleryPageId];
            if (!images) return; // для обложек не работают стрелки
            currentGalleryIndex = (currentGalleryIndex - 1 + images.length) % images.length;
            updateModalImage();
        };

        window.nextModalImage = function() {
            if (!currentGalleryPageId) return;
            const images = galleryImages[currentGalleryPageId];
            if (!images) return;
            currentGalleryIndex = (currentGalleryIndex + 1) % images.length;
            updateModalImage();
        };

        function updateModalImage() {
            if (!currentGalleryPageId) return;
            if (currentGalleryPageId.startsWith('cover_')) {
                // для обложек показываем реальное изображение
                const imgSrc = galleryImages[currentGalleryPageId];
                modalImage.src = imgSrc;
            } else {
                const images = galleryImages[currentGalleryPageId];
                // Подставляем реальный URL изображения
                modalImage.src = images[currentGalleryIndex];
            }
        }

        // обработчик клавиш для модального окна
        function handleGalleryKey(e) {
            if (e.key === 'Escape') {
                closeGalleryModal();
            } else if (e.key === 'ArrowLeft') {
                // Для обложек стрелки отключены (класс hide-nav)
                if (!galleryModal.classList.contains('hide-nav')) {
                    prevModalImage();
                    // При ручном переключении тоже показываем стрелки и перезапускаем таймер
                    showModalArrows();
                    startModalArrowsTimer();
                }
            } else if (e.key === 'ArrowRight') {
                if (!galleryModal.classList.contains('hide-nav')) {
                    nextModalImage();
                    showModalArrows();
                    startModalArrowsTimer();
                }
            }
        }

        // обработчик клавиш для основной галереи (не модальной)
        function handleMainGalleryKey(e) {
            if (galleryModal.style.display === 'flex') return; // не мешаем модалке
            if (!currentMainGalleryId) return;
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (currentMainGalleryId === 'gallery') {
                    prevGalleryImage(currentMainGalleryId, currentGallerySuffix);
                } else {
                    prevGalleryImage(currentMainGalleryId);
                }
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (currentMainGalleryId === 'gallery') {
                    nextGalleryImage(currentMainGalleryId, currentGallerySuffix);
                } else {
                    nextGalleryImage(currentMainGalleryId);
                }
            }
        }

        // Функция для рендеринга одной галереи (используется для Gallery)
        function renderSingleGallery(container, pageId, suffix, images, title) {
            const galleryId = `gallery-${pageId}-${suffix}`;
            const mainId = `gallery-main-${pageId}-${suffix}`;
            const thumbsId = `thumbs-${pageId}-${suffix}`;
            const modalKey = `gallery_${suffix}`; // ключ для galleryImages

            // Сохраняем изображения в galleryImages
            galleryImages[modalKey] = images;

            const imagesHTML = images.map((img, i) => 
                `<div class="thumb-item" data-index="${i}" onclick="setGalleryImage('${pageId}', ${i}, '${suffix}')" style="background-image: url('${img}'); background-size: cover; background-position: center;"></div>`
            ).join('');

            return `
                <div class="gallery-container" id="${galleryId}">
                    <div class="gallery-main" onclick="openGalleryModal('${modalKey}', 0); currentGallerySuffix = ${suffix};">
                        <div class="gallery-main-image" id="${mainId}" style="background-image: url('${images[0]}'); background-size: cover; background-position: center;"></div>
                        <div class="gallery-arrow prev" onclick="event.stopPropagation(); prevGalleryImage('${pageId}', '${suffix}')"></div>
                        <div class="gallery-arrow next" onclick="event.stopPropagation(); nextGalleryImage('${pageId}', '${suffix}')"></div>
                    </div>
                    <div class="gallery-thumbs" id="${thumbsId}">
                        ${imagesHTML}
                    </div>
                    <div class="gallery-description">
                        <h3>Название проекта (2026)</h3>
                        <h4>${title}</h4>
                        <p>Здесь будет развернутое описание проекта: использованные техники, концепция, особенности визуализации и результаты.</p>
                        <hr>
                    </div>
                </div>
            `;
        }

            currentIndex = index;

        // Функция для открытия модального окна с обложкой (без стрелок)
        function openCoverModal(index) {
            currentGalleryPageId = `cover_${index}`;
            currentGalleryIndex = index;
            // Сохраняем ссылку на изображение из trackData
            galleryImages[`cover_${index}`] = trackData[index-1].cover;

            galleryModal.classList.add('hide-nav');

        // Обработка клика по элементу 3D_ART
        window.handle3dArtClick = function(itemNumber) {
            openGalleryModal('3dart', itemNumber - 1);
        };

        // Функция для кнопки "Поделиться" на MUSIC_TRACKS
        window.shareTrack = function(trackNumber) {
            const url = new URL(window.location.href);
            url.hash = `#track-${trackNumber}`;
            navigator.clipboard.writeText(url.toString()).then(() => {
                alert(`Ссылка на трек ${trackNumber} скопирована!`);
            }).catch(() => {
                alert('Не удалось скопировать ссылку');
            });
        };

        // Функции для навигации по галерее (с поддержкой суффикса для Gallery)
		window.setGalleryImage = function(pageId, imgIndex, suffix = '') {
			if (pageId === 'gallery') {
				const stateKey = suffix ? `${pageId}_${suffix}` : pageId;
				const state = window.galleryStates[stateKey];
				if (!state) return;
				state.currentImage = imgIndex;
				const mainDiv = document.getElementById(`gallery-main-${pageId}-${suffix}`);
				if (mainDiv) {
					const imgSrc = state.images[imgIndex];
					// Устанавливаем фон как реальное изображение
					mainDiv.style.backgroundImage = `url('${imgSrc}')`;
					// Убираем текстовое содержимое
					mainDiv.textContent = '';
				}
				document.querySelectorAll(`#thumbs-${pageId}-${suffix} .thumb-item`).forEach(el => {
					el.classList.remove('active-thumb');
					if (el.dataset.index == imgIndex) el.classList.add('active-thumb');
				});
				currentGallerySuffix = parseInt(suffix);
			} else {
				const state = window.galleryStates[pageId];
				if (!state) return;
				state.currentImage = imgIndex;
				const mainDiv = document.getElementById(`gallery-main-${pageId}`);
				if (mainDiv) {
					const imgSrc = state.images[imgIndex];
					mainDiv.style.backgroundImage = `url('${imgSrc}')`;
					mainDiv.textContent = '';
				}
				document.querySelectorAll(`#thumbs-${pageId} .thumb-item`).forEach(el => {
					el.classList.remove('active-thumb');
					if (el.dataset.index == imgIndex) el.classList.add('active-thumb');
				});
			}
		};

        window.prevGalleryImage = function(pageId, suffix = '') {
            const stateKey = suffix ? `${pageId}_${suffix}` : pageId;
            const state = window.galleryStates[stateKey];
            if (!state) return;
            let newIndex = state.currentImage - 1;
            if (newIndex < 0) newIndex = state.images.length - 1;
            setGalleryImage(pageId, newIndex, suffix);
        };

        window.nextGalleryImage = function(pageId, suffix = '') {
            const stateKey = suffix ? `${pageId}_${suffix}` : pageId;
            const state = window.galleryStates[stateKey];
            if (!state) return;
            let newIndex = state.currentImage + 1;
            if (newIndex >= state.images.length) newIndex = 0;
            setGalleryImage(pageId, newIndex, suffix);
        };

        // Обработка кликов по ссылкам меню
        document.querySelectorAll('.side-panel a:not(.social-icons a)').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const href = link.getAttribute('href');
                if (href === 'page0.html') renderPage(0);
                else if (href === 'page1.html') renderPage(1);  // 3D_ART
                else if (href === 'page2.html') renderPage(2);  // Gallery
                else if (href === 'page3.html') renderPage(3);  // MUSIC_TRACKS
                else if (href === 'page4.html') renderPage(4);  // VIDEO_CLIPS
                else if (href === 'page5.html') renderPage(5);  // CONNECT
                // Политика конфиденциальности в меню отсутствует
            });
        });

        // Обработка клика по ссылке "Политика конфиденциальности" в подвале (индекс 6)
        document.getElementById('nav-privacy').addEventListener('click', (e) => {
            e.preventDefault();
            renderPage(6);
        });

        // Логотип ведёт на ID
        document.getElementById('logoLink').addEventListener('click', () => {
            renderPage(0);
        });

        // Управление меню (гамбургер и стрелка)
        const toggleBtn = document.getElementById('menuToggle');
        const menuArrow = document.getElementById('menuArrow');
        const body = document.body;

        function toggleMenu() {
            body.classList.toggle('menu-hidden');
            updateMenuArrow();
        }

        toggleBtn.addEventListener('click', toggleMenu);
        menuArrow.addEventListener('click', toggleMenu);

        function updateMenuArrow() {
            if (body.classList.contains('menu-hidden')) {
                menuArrow.textContent = '▶';
            } else {
                menuArrow.textContent = '◀';
            }
        }

        function setInitialMenuState() {
            if (window.innerWidth <= 700) {
                body.classList.add('menu-hidden');
            } else {
                body.classList.remove('menu-hidden');
            }
            updateMenuArrow();
        }
        setInitialMenuState();
        window.addEventListener('resize', setInitialMenuState);

        // Инициализация: показываем ID
        renderPage(0);

        // Глобальный обработчик клавиш для основной галереи
        document.addEventListener('keydown', handleMainGalleryKey);

        // Дополнительная защита изображений
        document.addEventListener('dragstart', function(e) {
            if (e.target.tagName === 'IMG') {
                e.preventDefault();
                return false;
            }
        });

        document.addEventListener('contextmenu', function(e) {
            if (e.target.tagName === 'IMG') {
                e.preventDefault();
                return false;
            }
        });

        // При загрузке страницы проверяем, есть ли якорь для трека, и прокручиваем к нему
        window.addEventListener('load', function() {
            if (window.location.hash && window.location.hash.startsWith('#track-')) {
                const id = window.location.hash;
                const element = document.querySelector(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            }
        });
    </script>
</body>
</html>
